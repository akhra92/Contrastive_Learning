data:
  raw_dir: "data/raw/nih-chest-xrays"
  processed_dir: "data/processed"
  image_size: 224
  num_workers: 4
  pin_memory: true

model:
  backbone: "resnet50"
  pretrained_imagenet: false
  projection_dim: 128
  projection_hidden_dim: 2048

training:
  epochs: 100
  batch_size: 256
  temperature: 0.1
  optimizer: "adam"
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 10
  early_stopping_patience: 15   # 0 to disable; stop after N epochs with no improvement
  early_stopping_min_delta: 1.0e-4
  seed: 42
  device: "auto"   # auto-detects mps > cuda > cpu

augmentation:
  random_resized_crop_scale: [0.08, 1.0]
  horizontal_flip_prob: 0.5
  rotation_degrees: 10           # random rotation ±10°
  color_jitter_prob: 0.8
  color_jitter_strength: 0.5
  gaussian_blur_prob: 0.5
  gaussian_blur_kernel_min: 3
  gaussian_blur_kernel_max: 23
  normalize_mean: "auto"   # loads from data/processed/norm_stats.json; falls back to ImageNet [0.485]
  normalize_std: "auto"    # loads from data/processed/norm_stats.json; falls back to ImageNet [0.229]

checkpointing:
  save_dir: "checkpoints/pretrain"
  save_every: 10

wandb:
  enabled: false
  project: "simclr-pretrain"
  run_name: null      # auto-generated if null
  tags: ["pretrain", "simclr"]

logging:
  log_dir: "logs"
  log_every: 50    # steps
