data:
  raw_dir: "data/raw/nih-chest-xrays"
  processed_dir: "data/processed"
  image_size: 224
  num_workers: 4
  pin_memory: true

model:
  backbone: "resnet50"
  pretrained_imagenet: false
  projection_dim: 128
  projection_hidden_dim: 2048

training:
  epochs: 100
  batch_size: 256
  temperature: 0.07
  optimizer: "adam"
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 10
  device: "auto"   # auto-detects mps > cuda > cpu

augmentation:
  random_resized_crop_scale: [0.08, 1.0]
  horizontal_flip_prob: 0.5
  color_jitter_prob: 0.8
  color_jitter_strength: 0.5
  gaussian_blur_prob: 0.5
  gaussian_blur_kernel_min: 3
  gaussian_blur_kernel_max: 23
  normalize_mean: [0.485]
  normalize_std: [0.229]

checkpointing:
  save_dir: "checkpoints/pretrain"
  save_every: 10

logging:
  log_dir: "logs"
  log_every: 50    # steps
