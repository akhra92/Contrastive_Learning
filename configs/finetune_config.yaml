data:
  raw_dir: "data/raw/nih-chest-xrays"
  processed_dir: "data/processed"
  image_size: 224
  num_workers: 4
  pin_memory: true

model:
  backbone: "resnet50"
  pretrained_checkpoint: "checkpoints/pretrain/best_encoder.pth"
  freeze_backbone: false
  classifier_hidden_dim: 512
  dropout: 0.3
  num_classes: 15

training:
  mode: "full_finetune"    # options: linear_probe | full_finetune | imagenet_baseline
  epochs: 50
  batch_size: 64
  optimizer: "adamw"
  lr: 1.0e-4
  backbone_lr_multiplier: 0.1
  weight_decay: 1.0e-2
  scheduler: "cosine"
  warmup_epochs: 5
  use_class_weights: true
  early_stopping_patience: 10   # 0 to disable; stop after N epochs with no improvement
  early_stopping_min_delta: 1.0e-4
  device: "auto"

augmentation:
  random_resized_crop_scale: [0.7, 1.0]
  horizontal_flip_prob: 0.5
  normalize_mean: [0.485]
  normalize_std: [0.229]

checkpointing:
  save_dir: "checkpoints/finetune"
  save_every: 5

logging:
  log_dir: "logs"
  log_every: 50
